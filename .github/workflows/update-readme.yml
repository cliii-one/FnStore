name: 更新 README 编译时间

on:
  workflow_run:
    workflows:
      - 构建 ClashLite
      - 构建 SubStore
      - 构建 fnnas-notes
      - 构建 MediaHub
      - 构建 OneServer
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 从 Releases 提取构建时间并更新 README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 -u << 'PYEOF'
          import json, re, subprocess, os

          def gh(*args):
              return subprocess.check_output(["gh"] + list(args), text=True)

          REPO = os.environ["REPO"]

          APPS = [
              {"name": "ClashLite",  "dir": "ClashLite",   "desc": "基于 mihomo 内核的代理管理应用",       "filter": "clashlite-v*"},
              {"name": "SubStore",   "dir": "SubStore",    "desc": "基于 Sub-Store 的订阅管理应用",       "filter": "substore-v*"},
              {"name": "fnnas-notes","dir": "fnnas-notes", "desc": "贴贴密笺 - 轻量安全的本地便签应用",    "filter": "fnnas-notes-v*"},
              {"name": "MediaHub",   "dir": "MediaHub",    "desc": "Emby + 115 云盘一站式媒体管理面板",   "filter": "mediahub-v*"},
              {"name": "OneServer",  "dir": "OneServer",   "desc": "飞牛 NAS SSH 终端管理工具",           "filter": "oneserver-v*"},
          ]

          result = gh("release", "list", "--repo", REPO, "--limit", "100", "--json", "tagName")
          releases = json.loads(result)

          build_times = {}
          for app in APPS:
              prefix = app["filter"].replace("*", "")
              matched = [r for r in releases if r["tagName"].startswith(prefix)]
              if not matched:
                  build_times[app["name"]] = "-"
                  continue
              tag = matched[0]["tagName"]
              view = gh("release", "view", tag, "--repo", REPO, "--json", "body")
              body = json.loads(view).get("body", "")
              m = re.search(r"构建时间[：:]\s*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})", body)
              build_times[app["name"]] = m.group(1) if m else "-"

          with open("README.md", "r") as f:
              content = f.read()

          header = "| 应用 | 最新版本 | 编译时间 |"
          sep    = "|:-----|:-------:|:-------:|"
          rows = []
          for app in APPS:
              badge_url = (
                  f"https://img.shields.io/github/v/release/{REPO}"
                  f"?filter={app['filter']}&label=&color=blue"
              )
              release_url = f"https://github.com/{REPO}/releases"
              badge = f"[![{app['name']}]({badge_url})]({release_url})"
              bt = build_times[app["name"]]
              rows.append(
                  f"| [{app['name']}]({app['dir']}/) — {app['desc']} | {badge} | {bt} |"
              )

          new_table = "\n".join([header, sep] + rows)

          pattern = r"\| 应用 \| 最新版本 \| 编译时间 \|[\s\S]*?(?=\n\n|\Z)"
          content = re.sub(pattern, new_table, content)

          with open("README.md", "w") as f:
              f.write(content)

          print("README 已更新:")
          for name, bt in build_times.items():
              print(f"  {name}: {bt}")
          PYEOF

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "无变更" && exit 0
          git add README.md
          git commit -m "docs: 自动更新编译时间"
          git push
