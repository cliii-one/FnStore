name: 构建 OneServer FPK

on:
  push:
    tags: ['oneserver-v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则读取 manifest）'
        required: false
        default: ''
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: ubuntu-latest
    name: 构建 ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            node_arch: x64
            fnpack_platform: x86
          - arch: arm64
            node_arch: arm64
            fnpack_platform: arm
    defaults:
      run:
        working-directory: OneServer

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 确定版本号
        id: version
        run: |
          MANIFEST_VER=$(grep '^version' manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/oneserver-v* ]]; then
            VERSION="${{ github.ref_name }}" && VERSION="${VERSION#oneserver-v}"
          else
            VERSION="${MANIFEST_VER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ========== 克隆私有源码 ==========
      - name: 克隆源码仓库
        env:
          PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${PRIVATE_TOKEN}@github.com/DinDing1/OneServer.git /tmp/oneserver-src

      # ========== 构建项目 ==========
      - name: 安装依赖并构建
        run: |
          cd /tmp/oneserver-src
          npm ci
          npm run build
          echo "✅ 构建完成"

      # ========== JavaScript 混淆 ==========
      - name: JavaScript 混淆
        run: |
          npm install -g javascript-obfuscator
          find /tmp/oneserver-src/apps/server/dist -name "*.js" | while read f; do
            javascript-obfuscator "$f" --output "$f" \
              --string-array true --string-array-encoding base64 \
              --control-flow-flattening true --dead-code-injection true \
              --self-defending false 2>/dev/null || true
          done
          echo "✅ JavaScript 混淆完成"

      # ========== 组装应用文件（对齐源仓库 workflow） ==========
      - name: 复制服务端构建产物
        run: |
          mkdir -p app/server/dist
          cp -r /tmp/oneserver-src/apps/server/dist/* app/server/dist/

      - name: 生成服务端运行时 package.json
        run: |
          node -e "
          const fs = require('fs');
          const source = JSON.parse(fs.readFileSync('/tmp/oneserver-src/apps/server/package.json', 'utf8'));
          const runtime = {
            name: 'one-server-runtime',
            private: true,
            type: 'module',
            main: 'dist/index.js',
            dependencies: Object.fromEntries(
              Object.entries(source.dependencies || {}).filter(([n]) => n !== '@one-server/shared')
            )
          };
          fs.writeFileSync('app/server/package.json', JSON.stringify(runtime, null, 2) + '\n');
          "

      - name: 安装服务端运行时依赖
        run: |
          npm install --omit=dev --no-bin-links --prefix app/server
          rm -rf app/server/node_modules/.bin

      - name: 复制前端构建产物
        run: |
          mkdir -p app/www/dist
          cp -r /tmp/oneserver-src/apps/www/dist/* app/www/dist/

      - name: 下载 Node.js 运行时
        run: |
          NODE_VER="24.15.0"
          mkdir -p app/runtime/bin
          curl -fsSL -o /tmp/node.tar.xz "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-linux-${{ matrix.node_arch }}.tar.xz"
          mkdir -p /tmp/_ne && tar xf /tmp/node.tar.xz -C /tmp/_ne
          cp /tmp/_ne/node-v${NODE_VER}-linux-${{ matrix.node_arch }}/bin/node app/runtime/bin/node
          chmod +x app/runtime/bin/node
          strip app/runtime/bin/node 2>/dev/null || true
          rm -rf /tmp/_ne /tmp/node.tar.xz

      - name: 更新 manifest
        run: |
          sed -i "s/^version.*/version=${{ steps.version.outputs.version }}/" manifest
          sed -i "s/^platform.*/platform=${{ matrix.fnpack_platform }}/" manifest

      - name: 修复脚本权限
        run: |
          for f in cmd/*; do [ -f "$f" ] && sed -i 's/\r$//' "$f" && chmod +x "$f"; done

      # ========== 打包 FPK ==========
      - name: 下载 fnpack 并打包
        run: |
          curl -fsSL -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64
          chmod +x /tmp/fnpack
          /tmp/fnpack build --directory .
          FPKN=$(ls *.fpk) && mv "$FPKN" oneserver-${{ matrix.arch == 'x86_64' && 'X86' || 'ARM' }}.fpk

      - name: 上传 FPK
        uses: actions/upload-artifact@v4
        with:
          name: oneserver-${{ matrix.arch }}
          path: OneServer/oneserver-*.fpk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/oneserver-v') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 下载 FPK
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
      - name: 删除旧版本
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null | while read tag; do
            case "$tag" in oneserver-*) gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true;; esac
          done
      - name: 确定构建信息
        id: info
        run: |
          MANIFEST_VER=$(grep '^version' OneServer/manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [[ "${{ github.ref }}" == refs/tags/oneserver-v* ]]; then
            TAG="${{ github.ref_name }}" && VERSION="${TAG#oneserver-v}"
          else
            TAG="oneserver-v${MANIFEST_VER}" && VERSION="${MANIFEST_VER}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M CST')" >> $GITHUB_OUTPUT
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "OneServer ${{ steps.info.outputs.version }}"
          files: ./artifacts/**/*.fpk
          body: |
            ## OneServer v${{ steps.info.outputs.version }}

            面向飞牛 NAS 的 SSH 终端管理工具。

            | 文件 | 架构 |
            |------|------|
            | `oneserver-X86.fpk` | x86_64 |
            | `oneserver-ARM.fpk` | arm64 |

            ---
            构建时间：${{ steps.info.outputs.build_time }}
