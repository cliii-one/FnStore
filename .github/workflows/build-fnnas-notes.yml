name: 构建 fnnas-notes FPK

on:
  push:
    tags: ['fnnas-notes-v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则读取 manifest 默认版本）'
        required: false
        default: ''
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: ubuntu-latest
    name: 构建 ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            fnpack_platform: x86
          - arch: arm64
            fnpack_platform: arm
    defaults:
      run:
        working-directory: fnnas-notes

    steps:
      # ========== 检出 FnStore 仓库 ==========
      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 确定版本号 ==========
      - name: 确定版本号
        id: version
        run: |
          MANIFEST_VER=$(grep '^version' manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/fnnas-notes-v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#fnnas-notes-v}"
          else
            VERSION="${MANIFEST_VER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      # ========== 克隆私有仓库源码 ==========
      - name: 克隆源码仓库
        env:
          PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone --depth=1 -b main https://x-access-token:${PRIVATE_TOKEN}@github.com/DinDing1/fnnas-notes.git /tmp/fnnas-notes-src
          echo "✅ 源码克隆完成"

      # ========== 构建 Flutter Web 前端 ==========
      - name: 配置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 构建 Flutter Web
        run: |
          cd /tmp/fnnas-notes-src/src/frontend
          flutter pub get
          flutter build web --release
          echo "✅ Flutter Web 构建完成"

      # ========== 配置 QEMU（ARM 交叉编译） ==========
      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ========== 编译 Python 后端为二进制 (Nuitka) ==========
      - name: 编译 Python 后端 (Nuitka)
        run: |
          cd /tmp/fnnas-notes-src/src/backend
          pip install nuitka cryptography ordered-set
          # 目标平台架构
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET_ARCH="--target=aarch64"
          else
            TARGET_ARCH=""
          fi
          python -m nuitka --standalone --onefile \
            ${TARGET_ARCH} \
            --include-package=handlers \
            --include-module=cryptography \
            --include-module=sqlite3 \
            --output-filename=server \
            --output-dir=/tmp/nuitka-out \
            server.py
          echo "✅ Python 后端编译完成"
          file /tmp/nuitka-out/server 2>/dev/null || true
          ls -lh /tmp/nuitka-out/server

      # ========== 组装应用文件 ==========
      - name: 组装应用文件
        run: |
          # Flutter Web 产物 → app/ui/
          mkdir -p app/ui
          cp -r /tmp/fnnas-notes-src/src/frontend/build/web/* app/ui/
          cp $GITHUB_WORKSPACE/fnnas-notes/app/ui/config app/ui/config 2>/dev/null || true
          mkdir -p app/ui/images
          cp $GITHUB_WORKSPACE/fnnas-notes/app/ui/images/* app/ui/images/ 2>/dev/null || true

          # Nuitka 编译产物 → app/server/
          mkdir -p app/server
          cp /tmp/nuitka-out/server app/server/server
          chmod +x app/server/server
          echo "✅ 应用文件组装完成"

      # ========== 更新 manifest ==========
      - name: 更新 manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.fnpack_platform }}"
          sed -i "s/^version.*/version=${VERSION}/" manifest
          sed -i "s/^platform.*/platform=${PLATFORM}/" manifest

      # ========== 修复脚本权限 ==========
      - name: 修复脚本权限
        run: |
          for f in cmd/main cmd/install_init cmd/install_callback cmd/uninstall_init cmd/uninstall_callback cmd/upgrade_init cmd/upgrade_callback cmd/config_init cmd/config_callback; do
            [ -f "$f" ] && sed -i 's/\r$//' "$f" && chmod +x "$f"
          done

      # ========== 使用 fnpack 打包 FPK ==========
      - name: 下载 fnpack 并打包
        run: |
          curl -fsSL -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64
          chmod +x /tmp/fnpack
          /tmp/fnpack build --directory .
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            mv fnnas.notes.fpk fnnas-notes-X86.fpk
          else
            mv fnnas.notes.fpk fnnas-notes-ARM.fpk
          fi
          echo "✅ 构建完成: $(ls -lh *.fpk)"

      # ========== 上传产物 ==========
      - name: 上传 FPK
        uses: actions/upload-artifact@v4
        with:
          name: fnnas-notes-${{ matrix.arch }}
          path: fnnas-notes/fnnas-notes-*.fpk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/fnnas-notes-v') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有 FPK
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: 删除旧版本 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null || echo "")
          echo "$RELEASES" | while read -r tag; do
            case "$tag" in fnnas-notes-*) gh release delete "${tag}" --yes --cleanup-tag 2>/dev/null || true;; esac
          done

      - name: 确定构建信息
        id: info
        run: |
          MANIFEST_VER=$(grep '^version' fnnas-notes/manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [[ "${{ github.ref }}" == refs/tags/fnnas-notes-v* ]]; then
            TAG="${{ github.ref_name }}" && VERSION="${TAG#fnnas-notes-v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="fnnas-notes-v${{ github.event.inputs.version }}" && VERSION="${{ github.event.inputs.version }}"
          else
            TAG="fnnas-notes-v${MANIFEST_VER}" && VERSION="${MANIFEST_VER}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M CST')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "贴贴密笺 ${{ steps.info.outputs.version }}"
          files: ./artifacts/**/*.fpk
          generate_release_notes: false
          body: |
            ## 贴贴密笺 v${{ steps.info.outputs.version }}

            为 FnNAS / 飞牛 OS 打造的轻量、安全、优雅的本地便签应用。

            ### 📦 下载

            | 文件 | 架构 | 适用设备 |
            |------|------|----------|
            | `fnnas-notes-X86.fpk` | x86_64 | Intel/AMD NAS |
            | `fnnas-notes-ARM.fpk` | arm64 | ARM NAS |

            ### ✨ 功能特性

            - 📝 Markdown 编辑与实时预览
            - 🔒 AES-256-GCM 内容加密
            - 🏷️ 分类、标签、全局搜索
            - 📜 版本历史与一键回滚
            - 📤 分享链接与访问统计

            ---
            构建时间：${{ steps.info.outputs.build_time }}
